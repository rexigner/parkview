# ─────────────────────────────────────────────
#  docker-compose.yml  —  Streamlit deployment orchestration
# ─────────────────────────────────────────────

version: '3.8'

services:
  streamlit-app:
    build: .
    container_name: parking-bot-streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DB_PATH=/app/data/parking.db
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Add a separate Telegram bot service
  # telegram-bot:
